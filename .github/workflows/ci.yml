name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy weather_display

      - name: Smoke-test the GUI
        run: xvfb-run -a python -c "from weather_display.gui.app_window import AppWindow; window = AppWindow(); window.update_idletasks(); window.destroy()"

      - name: Build package
        if: matrix.python-version == '3.11'
        run: python -m build
